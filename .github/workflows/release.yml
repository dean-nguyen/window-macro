name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install nuitka ordered-set zstandard

      - name: Run tests
        run: python -m pytest tests/ -q

      - name: Inject build-time config (KeyAuth creds, cache secret)
        shell: pwsh
        env:
          PURCHASE_URL: ${{ secrets.PURCHASE_URL }}
          SUPPORT_URL: ${{ secrets.SUPPORT_URL }}
          KEYAUTH_APP_NAME: ${{ secrets.KEYAUTH_APP_NAME }}
          KEYAUTH_OWNER_ID: ${{ secrets.KEYAUTH_OWNER_ID }}
          KEYAUTH_VERSION: ${{ secrets.KEYAUTH_VERSION }}
          CACHE_HMAC_SECRET: ${{ secrets.CACHE_HMAC_SECRET }}
        run: |
          @"
          # Generated by CI from repository secrets — do not commit.
          PURCHASE_URL = r'''$env:PURCHASE_URL'''
          SUPPORT_URL = r'''$env:SUPPORT_URL'''
          KEYAUTH_APP_NAME = r'''$env:KEYAUTH_APP_NAME'''
          KEYAUTH_OWNER_ID = r'''$env:KEYAUTH_OWNER_ID'''
          KEYAUTH_VERSION = r'''$env:KEYAUTH_VERSION'''
          CACHE_HMAC_SECRET = r'''$env:CACHE_HMAC_SECRET'''
          "@ | Out-File -FilePath engine/_build_config.py -Encoding utf8

      - name: Verify release config is safe
        # Fail the build if KeyAuth is configured (a paid build) but the cache
        # signing secret is missing or still the public placeholder — that would
        # ship a forgeable Pro cache.
        run: |
          python -c "from engine import product_config as c; import sys; \
          configured = c.keyauth_configured(); \
          bad = configured and (c.cache_secret_is_default() or not c.CACHE_HMAC_SECRET); \
          sys.exit('CACHE_HMAC_SECRET secret is missing/placeholder for a configured build' if bad else 0)"

      - name: Build with Nuitka
        run: |
          python -m nuitka --standalone --zig --windows-console-mode=disable `
            --enable-plugin=tk-inter `
            --include-package=engine `
            --include-package=gui `
            --include-module=win32gui `
            --include-module=win32api `
            --include-module=win32con `
            --include-module=pywintypes `
            --output-dir=. `
            --output-filename=WindowMacroBot.exe `
            --assume-yes-for-downloads `
            main.py

      - name: Package release zip
        run: Compress-Archive -Path main.dist\* -DestinationPath WindowMacroBot-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: WindowMacroBot-${{ github.ref_name }}.zip
          generate_release_notes: true
